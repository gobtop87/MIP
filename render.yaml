services:
  - type: web
    name: mip-dashboard
    runtime: python
    plan: free
    buildCommand: >-
      pip install -r requirements.txt &&
      python3 -m news_watch.seed_demo_data &&
      (python3 -m news_watch.fetch_news || true) &&
      python3 -m alerts.generate_alerts &&
      (python3 database/fade_score.py || true)
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
